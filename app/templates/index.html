<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码安全扫描平台 | 反序列化漏洞检测</title>
    <!-- Bootstrap 5 CSS + 图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', system-ui, -apple-system;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            border: none;
        }
        .card-header {
            background-color: #fff;
            border-bottom: 2px solid #e9ecef;
            border-radius: 1rem 1rem 0 0 !important;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }
        .severity-badge {
            font-weight: 600;
            padding: 0.3rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        .severity-high { background-color: #dc3545; color: white; }
        .severity-medium { background-color: #fd7e14; color: white; }
        .severity-low { background-color: #0d6efd; color: white; }
        .table th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }
        pre {
            background: #1e1e2f;
            color: #f8f8f2;
            padding: 1rem;
            border-radius: 0.8rem;
            overflow-x: auto;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: #6c757d;
        }
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #0d6efd;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .issue-card {
            transition: all 0.2s;
        }
        .issue-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- 头部 -->
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">
                <i class="bi bi-shield-lock-fill text-primary"></i> 代码安全扫描平台
            </h1>
            <p class="lead">基于 AST 的反序列化漏洞检测 | 支持 pickle / yaml / joblib / numpy</p>
        </div>

        <!-- 认证卡片 -->
        <div class="card" id="auth-card">
            <div class="card-header">
                <i class="bi bi-person-circle"></i> 用户认证
            </div>
            <div class="card-body">
                <!-- 登录表单 -->
                <div id="login-form">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" id="login-username" class="form-control" placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" id="login-password" class="form-control" placeholder="请输入密码">
                    </div>
                    <button onclick="login()" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                    <div class="text-center mt-3">
                        <a href="#" onclick="showRegister()">还没有账号？立即注册</a>
                    </div>
                </div>
                <!-- 注册表单（初始隐藏） -->
                <div id="register-form" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" id="reg-username" class="form-control" placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" id="reg-password" class="form-control" placeholder="请输入密码">
                    </div>
                    <button onclick="register()" class="btn btn-success w-100">
                        <i class="bi bi-person-plus"></i> 注册
                    </button>
                    <div class="text-center mt-3">
                        <a href="#" onclick="showLogin()">返回登录</a>
                    </div>
                </div>
                <!-- 登录后信息 -->
                <div id="user-info" style="display: none;">
                    <div class="alert alert-success">
                        <i class="bi bi-check-circle-fill"></i> 已登录：<strong id="username-display"></strong>
                    </div>
                    <button onclick="logout()" class="btn btn-outline-danger w-100">
                        <i class="bi bi-box-arrow-left"></i> 登出
                    </button>
                </div>
            </div>
        </div>

        <!-- 扫描卡片（仅登录后可见） -->
        <div id="scan-card" class="card" style="display: none;">
            <div class="card-header">
                <i class="bi bi-search-heart"></i> 发起代码扫描
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">目标文件路径（容器内绝对路径或相对于 /app）</label>
                    <input type="text" id="target-path" class="form-control" placeholder="例如: test_samples/vulnerable_samples.py">
                    <div class="form-text text-muted">
                        <i class="bi bi-info-circle"></i> 示例：test_samples/vulnerable_samples.py
                    </div>
                </div>
                <button onclick="startScan()" class="btn btn-primary w-100" id="scanBtn">
                    <i class="bi bi-play-fill"></i> 开始扫描
                </button>
                <div id="scan-loading" class="text-center mt-3" style="display: none;">
                    <span class="loading-spinner"></span> 扫描中，请稍候...
                </div>
            </div>
        </div>

        <!-- 结果展示卡片（仅登录后可见） -->
        <div id="result-card" class="card" style="display: none;">
            <div class="card-header">
                <i class="bi bi-bar-chart-steps"></i> 扫描结果
            </div>
            <div class="card-body" id="result-content">
                <p class="text-muted text-center">暂无扫描结果，请发起扫描。</p>
            </div>
        </div>

        <div class="footer">
            <i class="bi bi-github"></i> SE-NetSec-2026-111 | 基于 AST 的静态分析引擎
        </div>
    </div>

    <script>
        let token = localStorage.getItem('access_token');

        // 初始化UI
        function updateUI() {
            if (token) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('scan-card').style.display = 'block';
                document.getElementById('result-card').style.display = 'block';
                fetchUserInfo();
            } else {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('scan-card').style.display = 'none';
                document.getElementById('result-card').style.display = 'none';
            }
        }

        async function fetchUserInfo() {
            try {
                const res = await fetch('/auth/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('username-display').innerText = data.username;
                } else {
                    logout();
                }
            } catch(e) { logout(); }
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                token = data.access_token;
                localStorage.setItem('access_token', token);
                updateUI();
            } else {
                alert('登录失败：' + (data.msg || '用户名或密码错误'));
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                alert('注册成功，请登录');
                showLogin();
            } else {
                alert('注册失败：' + (data.msg || '未知错误'));
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            token = null;
            updateUI();
        }

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        // 扫描核心逻辑
        let currentInterval = null;

        async function startScan() {
            const targetPath = document.getElementById('target-path').value.trim();
            if (!targetPath) {
                alert('请输入目标文件路径');
                return;
            }
            const scanBtn = document.getElementById('scanBtn');
            const loadingDiv = document.getElementById('scan-loading');
            scanBtn.disabled = true;
            loadingDiv.style.display = 'block';
            document.getElementById('result-content').innerHTML = '<p class="text-muted text-center">扫描任务已提交，等待结果...</p>';

            try {
                const res = await fetch('/scan/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ target_path: targetPath })
                });
                const data = await res.json();
                if (res.ok) {
                    const taskId = data.task_id;
                    pollResult(taskId);
                } else {
                    loadingDiv.style.display = 'none';
                    scanBtn.disabled = false;
                    document.getElementById('result-content').innerHTML = `<div class="alert alert-danger">启动失败: ${data.msg || '未知错误'}</div>`;
                }
            } catch (err) {
                loadingDiv.style.display = 'none';
                scanBtn.disabled = false;
                document.getElementById('result-content').innerHTML = `<div class="alert alert-danger">请求异常: ${err.message}</div>`;
            }
        }

        function pollResult(taskId) {
            if (currentInterval) clearInterval(currentInterval);
            currentInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/scan/result/${taskId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.status === 'completed') {
                        clearInterval(currentInterval);
                        currentInterval = null;
                        document.getElementById('scan-loading').style.display = 'none';
                        document.getElementById('scanBtn').disabled = false;
                        renderResults(data.result);
                    } else if (data.status === 'failed') {
                        clearInterval(currentInterval);
                        currentInterval = null;
                        document.getElementById('scan-loading').style.display = 'none';
                        document.getElementById('scanBtn').disabled = false;
                        document.getElementById('result-content').innerHTML = `<div class="alert alert-danger">扫描失败: ${data.result?.error || '未知错误'}</div>`;
                    }
                } catch (err) {
                    // 忽略网络错误，继续轮询
                }
            }, 2000);
        }

        // 渲染漏洞列表（清晰表格）
        function renderResults(banditOutput) {
            const container = document.getElementById('result-content');
            if (!banditOutput || !banditOutput.results || banditOutput.results.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-success text-center">
                        <i class="bi bi-check-circle-fill"></i> 未检测到不安全反序列化问题
                    </div>
                `;
                return;
            }

            const issues = banditOutput.results;
            // 统计严重程度
            let highCount = issues.filter(i => i.severity === 'HIGH').length;
            let mediumCount = issues.filter(i => i.severity === 'MEDIUM').length;
            let lowCount = issues.filter(i => i.severity === 'LOW').length;

            let html = `
                <div class="mb-3">
                    <span class="badge bg-danger">高危 ${highCount}</span>
                    <span class="badge bg-warning text-dark">中危 ${mediumCount}</span>
                    <span class="badge bg-info">低危 ${lowCount}</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>行号</th>
                                <th>严重程度</th>
                                <th>测试名称</th>
                                <th>漏洞描述</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            for (let issue of issues) {
                let severityClass = issue.severity === 'HIGH' ? 'severity-high' : (issue.severity === 'MEDIUM' ? 'severity-medium' : 'severity-low');
                let severityText = issue.severity;
                html += `
                    <tr>
                        <td class="text-center">${issue.line_number || '?'}</td>
                        <td><span class="severity-badge ${severityClass}">${severityText}</span></td>
                        <td><code>${issue.test_name || 'detect_insecure_deserialization'}</code></td>
                        <td>${escapeHtml(issue.issue_text)}</td>
                    </tr>
                `;
            }
            html += `</tbody></table></div>`;
            // 附加原始 JSON 折叠信息（可选）
            html += `
                <details class="mt-3">
                    <summary class="text-muted">查看原始 JSON 输出</summary>
                    <pre class="mt-2">${escapeHtml(JSON.stringify(banditOutput, null, 2))}</pre>
                </details>
            `;
            container.innerHTML = html;
        }

        // 简单的防XSS转义
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        updateUI();
    </script>
</body>
</html>
