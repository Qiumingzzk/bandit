services:
  mysql:
    image: mysql:8
    container_name: local-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: secscan
    volumes:
      - ./mysql_data:/var/lib/mysql
  redis:
    image: redis:7-alpine
    container_name: local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"